services:
    # Production frontend -- always runs
    monochrome:
        build:
            context: ..
            dockerfile: docker/Dockerfile
            args:
                - AUTH_ENABLED=${AUTH_ENABLED}
                - AUTH_SECRET=${AUTH_SECRET}
                - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
                - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
                - POCKETBASE_URL=${POCKETBASE_URL}
                - SESSION_MAX_AGE=${SESSION_MAX_AGE}
        container_name: monochrome
        ports:
            - '${MONOCHROME_PORT:-3000}:4173'
        environment:
            PORT: 4173
            DOWNLOAD_DIR: ${DOWNLOAD_DIR:-/data/music}
            TEMP_DIR: ${TEMP_DIR:-/tmp/monochrome-downloads}
            DOWNLOAD_WORKER_ENABLED: ${DOWNLOAD_WORKER_ENABLED:-true}
            DOWNLOAD_WORKER_CONCURRENCY: ${DOWNLOAD_WORKER_CONCURRENCY:-1}
            DOWNLOAD_DUPLICATE_CHECK: ${DOWNLOAD_DUPLICATE_CHECK:-false}
            DOWNLOAD_MAINTENANCE_LOCK_TIMEOUT_MS: ${DOWNLOAD_MAINTENANCE_LOCK_TIMEOUT_MS:-30000}
            DOWNLOAD_TRANSIENT_MIN_AGE_MS: ${DOWNLOAD_TRANSIENT_MIN_AGE_MS:-900000}
            REDIS_URL: ${REDIS_URL:-}
            DOWNLOAD_API_INSTANCES: ${DOWNLOAD_API_INSTANCES:-}
            DOWNLOAD_STREAMING_INSTANCES: ${DOWNLOAD_STREAMING_INSTANCES:-}
            DOWNLOAD_QOBUZ_INSTANCES: ${DOWNLOAD_QOBUZ_INSTANCES:-}
            AMAZON_MUSIC_ENABLED: ${AMAZON_MUSIC_ENABLED:-}
            AMAZON_MUSIC_API_BASE_URL: ${AMAZON_MUSIC_API_BASE_URL:-}
            AMAZON_MUSIC_CONVERTER_BASE_URL: ${AMAZON_MUSIC_CONVERTER_BASE_URL:-}
            AMAZON_MUSIC_TURNSTILE_SITE_KEY: ${AMAZON_MUSIC_TURNSTILE_SITE_KEY:-}
            AMAZON_MUSIC_TURNSTILE_BYPASS_TOKEN: ${AMAZON_MUSIC_TURNSTILE_BYPASS_TOKEN:-}
            DEEZER_FALLBACK_ENABLED: ${DEEZER_FALLBACK_ENABLED:-}
            DEEZER_FALLBACK_API_BASE_URL: ${DEEZER_FALLBACK_API_BASE_URL:-}
        volumes:
            - '${MONOCHROME_MUSIC_DIR:-../music}:/data/music'
            - monochrome_download_tmp:/tmp/monochrome-downloads
        restart: unless-stopped
        networks:
            - monochrome-network
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4173/api/downloads']
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s

    # Optional Redis backend for persistent queue state and cross-process maintenance locking.
    monochrome-redis:
        image: redis:7-alpine
        container_name: monochrome-redis
        profiles:
            - redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - monochrome_redis:/data
        networks:
            - monochrome-network

    # PocketBase backend -- only starts with: docker compose --profile pocketbase up -d
    pocketbase:
        image: ghcr.io/muchobien/pocketbase:latest
        container_name: monochrome-pocketbase
        profiles:
            - pocketbase
        restart: unless-stopped
        environment:
            PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@example.com}
            PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-changeme}
            TZ: ${TZ:-UTC}
        ports:
            - '${POCKETBASE_PORT:-8090}:8090'
        volumes:
            - pb_data:/pb_data
            - pb_public:/pb_public
            - pb_hooks:/pb_hooks
        command: serve --http=0.0.0.0:8090
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8090/api/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        networks:
            - monochrome-network

    # Development server -- only starts with: docker compose --profile dev up -d
    monochrome-dev:
        build:
            context: ..
            dockerfile: docker/Dockerfile.dev
        container_name: monochrome-dev
        profiles:
            - dev
        ports:
            - '${MONOCHROME_DEV_PORT:-5173}:5173'
        volumes:
            - ..:/app
            - /app/node_modules
        command: npm run dev -- --host 0.0.0.0
        networks:
            - monochrome-network

networks:
    monochrome-network:
        driver: bridge

volumes:
    pb_data:
    pb_public:
    pb_hooks:
    monochrome_download_tmp:
    monochrome_redis:
